<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12977a"/>
      <stop offset="1" stop-color="#084c3b"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0" stop-color="#fff3d4" stop-opacity="1"/>
      <stop offset="0.4" stop-color="#f3d089" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#f4c96a" stop-opacity="0"/>
    </radialGradient>
    <!-- the diamond of light: violet (AI) melting into gold (lamp) -->
    <linearGradient id="spark" x1="0.2" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#b493e6"/>
      <stop offset="0.5" stop-color="#e6bd6a"/>
      <stop offset="1" stop-color="#efb63c"/>
    </linearGradient>
    <!-- the golden hilal cradling it -->
    <linearGradient id="hilal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3d089"/>
      <stop offset="1" stop-color="#e9a93f"/>
    </linearGradient>
  </defs>

  <!-- ~9% transparent margin around the tile (breathing room) -->
  <g transform="translate(46 46) scale(0.8203)">
    <!-- brand tile -->
    <rect width="512" height="512" rx="115" fill="url(#tile)"/>

    <!-- cream niche (outer arch = the مشكاة) -->
    <path fill="#f4ecda" d="M158 410 L158 322 A196 196 0 0 1 256 152.3 A196 196 0 0 1 354 322 L354 410 Z"/>
    <!-- recess (inner arch) -->
    <path fill="#053528" d="M180 410 L180 322 A152 152 0 0 1 256 190.4 A152 152 0 0 1 332 322 L332 410 Z"/>

    <!-- light filling the niche -->
    <ellipse cx="256" cy="316" rx="128" ry="150" fill="url(#halo)"/>

    <!-- الهلال الذهبي: قوسٌ يحتضن النجمة — وهو قدحُ المصباح أيضًا -->
    <path fill="url(#hilal)" d="M192 318 A64 64 0 1 0 320 318 A84 84 0 0 1 192 318 Z"/>

    <!-- المعيّن نجمةً في قلب الهلال (نور المصباح) -->
    <g transform="translate(208 248) scale(4)">
      <path fill="url(#spark)" d="M12 2C12.4 7.2 16.8 11.6 22 12C16.8 12.4 12.4 16.8 12 22C11.6 16.8 7.2 12.4 2 12C7.2 11.6 11.6 7.2 12 2Z"/>
    </g>
    <!-- inner glint (keeps it reading as light, not a solid gem) -->
    <g transform="translate(229.6 269.6) scale(2.2)">
      <path fill="#fff7de" opacity="0.9" d="M12 6C12.2 9 14.9 11.7 18 12C14.9 12.3 12.2 15 12 18C11.8 15 9.1 12.3 6 12C9.1 11.7 11.8 9 12 6Z"/>
    </g>

    <!-- niche sill -->
    <rect x="146" y="406" width="220" height="20" rx="10" fill="#f4ecda"/>
  </g>
</svg>
